<!DOCTYPE html>
<html lang="ko-KR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <style>
    .world {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 80vw;
      height: 80vh;
      background: #fff000;
      /* perspective: 500px; */
    }
    .card {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100px;
      height: 150px;
      margin: 1em;
      font-size: 1.5rem;
      border-radius: 0.5em;
      background: red;
      transform: perspective(500px) rotateY(45deg);
    }
  </style>
</head>
<body>
  <div class="world">
    <div class="card">Card</div>
    <div class="card">Card</div>
    <div class="card">Card</div>
  </div>
</body>
</html>
