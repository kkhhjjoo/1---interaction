<!DOCTYPE html>
<html lang="ko-KR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <style>
    .world {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 80vw;
      height: 80vh;
      background: #fff000;
      perspective: 500px;
    }
    .card {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100px;
      height: 150px;
      margin: 1em;
      transform: rotateY(0deg);
      transition: 1s;
      transform-style: preserve-3d;
      /* 인터넷 익스플로러에서는 지원이 안됨 */

      transform-origin: left;
    }
    .card-side {
      display: flex;
      justify-content: center;
      align-items: center;
      position: absolute;
      left: 50%;
      top: 50%;
      width: 100px;
      height: 150px;
      margin: -75px 0 0 -50px;
      /* width: 100%;
      height: 100%; */
      font-size: 1.5rem;
      border-radius: 0.5em;
      -webkit-backface-visibility: hidden;
      transition: 1s;
      /* 사파리 */

      -moz-backface-visibility: hidden;
      /* 모질라 */

      -o-backface-visibility: hidden;
      /* 오페라 */

      
      backface-visibility: hidden;
      /* 크롬: 표준스타일은 마지막에 해야함 */
    }
    .card-side-front {
      z-index: 1;
      background: white;
    }
     .card-side-back {
      transform: rotateY(180deg);
      background: red;
    }
    .world:hover .card-side-front {
      transform: rotateY(180deg);
    }
    .world:hover .card-side-back {
      transform: rotateY(360deg);
    }
  </style>
</head>
<body>
  <div class="world">
    <!-- <div class="card"> -->
      <div class="card-side card-side-front">F</div>
      <div class="card-side card-side-back">B</div>
    <!-- </div> -->
    
  </div>
</body>
</html>
